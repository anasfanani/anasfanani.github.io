# https://decapcms.org/docs/beta-features/#working-with-a-local-git-repository
local_backend: true # Allowin local development
backend:
  name: github
  repo: anasfanani/anasfanani.github.io # Path to your GitHub repository
  branch: dev
# backend:
#   name: git-gateway


media_folder: "assets/img" # Folder where user uploaded files should go
public_folder: "/img"

collections: # A list of collections the CMS should be able to edit
  - name: "post_en" # Used in routes, ie.: /admin/collections/:slug/edit
    label: "Post English" # Used in the UI, ie.: "New Post"
    folder: "content/en/post" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    nested:
      depth: 100 # max depth to show in the collection tree
      summary: '{{title}}' # optional summary for a tree node, defaults to the inferred title field
    media_folder: ''
    public_folder: ''
    path: '{{slug}}/index'
    fields: # The fields each document in this collection have https://decapcms.org/docs/widgets/#relation
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tags",name: "tags",widget: "list",add_to_top: true}
      - {label: "Categories",name: "categories",widget: "list",add_to_top: true}
      - {label: "Publish Date", name: "date", widget: "datetime",date_format: "DD/MM/YYYY",time_format: "HH:mm", format: "YYYY-MM-DD HH:mm:ssZ" }
      - {label: "Intro Blurb", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
  - name: "post_id" # Used in routes, ie.: /admin/collections/:slug/edit
    label: "Post Indonesia" # Used in the UI, ie.: "New Post"
    folder: "content/id/post" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    nested:
      depth: 100 # max depth to show in the collection tree
      summary: '{{title}}' # optional summary for a tree node, defaults to the inferred title field
    media_folder: ''
    public_folder: ''
    path: '{{slug}}/index'
    fields: # The fields each document in this collection have https://decapcms.org/docs/widgets/#relation
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tags",name: "tags",widget: "list",add_to_top: true}
      - {label: "Categories",name: "categories",widget: "list",add_to_top: true}
      - {label: "Publish Date", name: "date", widget: "datetime",date_format: "DD/MM/YYYY",time_format: "HH:mm", format: "YYYY-MM-DD HH:mm:ssZ" }
      - {label: "Intro Blurb", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
  - name: "page_en" # Used in routes, ie.: /admin/collections/:slug/edit
    label: "Page English" # Used in the UI, ie.: "New Post"
    folder: "content/en/page" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    nested:
      depth: 100 # max depth to show in the collection tree
      summary: '{{title}}' # optional summary for a tree node, defaults to the inferred title field
    media_folder: ''
    public_folder: ''
    path: '{{slug}}/index'
    fields: # The fields each document in this collection have https://decapcms.org/docs/widgets/#relation
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime",date_format: "DD/MM/YYYY",time_format: "HH:mm", format: "YYYY-MM-DD HH:mm:ssZ" }
      - {label: "Layout", name: "layout", widget: "string",hint: "Custom Layout, read more at (https://stack.jimmycai.com)."}
      - label: "Outputs"
        name: "outputs"
        widget: "list"
        fields:
          - {label: "Format", name: "format", widget: "string", hint: "Output format, default is HTML."}
          - {label: "Extension", name: "extension", widget: "string", hint: "Output extension, default is .html."}
          - {label: "Media Type", name: "mediaType", widget: "string", hint: "Output media type, default is text/html."}
          - {label: "Rel", name: "rel", widget: "string", hint: "Output rel, default is canonical."}
          - {label: "Link Title", name: "linkTitle", widget: "string", hint: "Output link title, default is empty."}
          - {label: "No Index", name: "noIndex", widget: "boolean", hint: "Output no index, default is false."}
          - {label: "No Follow", name: "noFollow", widget: "boolean", hint: "Output no follow, default is false."}
          - {label: "No Archive", name: "noArchive", widget: "boolean", hint: "Output no archive, default is false."}
          - {label: "No Snippet", name: "noSnippet", widget: "boolean", hint: "Output no snippet, default is false."}
          - {label: "No Image Index", name: "noImageIndex", widget: "boolean", hint: "Output no image index, default is false."}
          - {label: "No ODP", name: "noODP", widget: "boolean", hint: "Output no ODP, default is false."}
          - {label: "No Translate", name: "noTranslate", widget: "boolean", hint: "Output no translate, default is false."}
      - {label: "Slug", name: "slug", widget: "string",hint: "Custom slug URL."}
      - label: "Menu"
        name: "menu"
        widget: "object"
        hint: "Add new menu in home page."
        collapsed: true
        fields:
          - label: "Main"
            name: "main"
            hint: "Main Menu"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Identifier", name: "identifier", widget: "string", hint: "Item ID"}
              - {label: "Name", name: "name", widget: "string", hint: "Display text"}
              - {label: "URL", name: "url", widget: "string", hint: "Link URL"}
              - {label: "Weight", name: "weight", widget: "number", hint: "Priority of the item, lower value means higher priority."}
              - label: "Params"
                name: "params"
                widget: "object"
                fields:
                  - {label: "Icon", name: "icon", widget: "string", hint: "Specify which SVG icon should be used. (https://tabler-icons.io/)"}
                  - {label: "New Tab", name: "newtab", widget: "boolean", hint: "Open this link in new tab."}
          - label: "Social"
            name: "social"
            hint: "Social Menu ( Icon Only)"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Identifier", name: "identifier", widget: "string", hint: "Item ID"}
              - {label: "Name", name: "name", widget: "string", hint: "Display text"}
              - {label: "URL", name: "url", widget: "string", hint: "Link URL"}
              - {label: "Weight", name: "weight", widget: "number", hint: "Priority of the item, lower value means higher priority."}
              - label: "Params"
                name: "params"
                widget: "object"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "string"
                    hint: "If icon is set to archive, theme will look for archive.svg under `assets/icons` folder. This theme comes with some SVG icons from Tabler Icons (https://tabler-icons.io/) . You can find them under theme folder assets/icons. To include more icons, just download them from website above, and place them under assets/icons folder of your Hugo site."
                  - {label: "New Tab", name: "newtab", widget: "boolean", hint: "Open this link in new tab."}
      - {label: "Comments", name: "comments", widget: "boolean",hint: "Allow comments on this page.", default: true}
      - label: "Links"
        name: "links"
        hint: "Links Menu"
        widget: "object"
        collapsed: true
        fields:
          - label: "Website"
            name: "list"
            widget: "list"
            hint: "Website"
            allow_add: true
            fields: 
              - {label: Title, name: title, widget: string}
              - {label: Description, name: description, widget: string}
              - {label: Website, name: website, widget: string}
              - {label: Image, name: image, widget: string}
      - {label: "Body", name: "body", widget: "markdown", hint: "You can leave empty if not used this.", required: false}
  - name: "page_id" # Used in routes, ie.: /admin/collections/:slug/edit
    label: "Page Indonesia" # Used in the UI, ie.: "New Post"
    folder: "content/id/page" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    nested:
      depth: 100 # max depth to show in the collection tree
      summary: '{{title}}' # optional summary for a tree node, defaults to the inferred title field
    media_folder: ''
    public_folder: ''
    path: '{{slug}}/index'
    fields: # The fields each document in this collection have https://decapcms.org/docs/widgets/#relation
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime",date_format: "DD/MM/YYYY",time_format: "HH:mm", format: "YYYY-MM-DD HH:mm:ssZ" }
      - {label: "Layout", name: "layout", widget: "string",hint: "Custom Layout, read more at (https://stack.jimmycai.com)."}
      - label: "Outputs"
        name: "outputs"
        widget: "list"
        fields:
          - {label: "Format", name: "format", widget: "string", hint: "Output format, default is HTML."}
          - {label: "Extension", name: "extension", widget: "string", hint: "Output extension, default is .html."}
          - {label: "Media Type", name: "mediaType", widget: "string", hint: "Output media type, default is text/html."}
          - {label: "Rel", name: "rel", widget: "string", hint: "Output rel, default is canonical."}
          - {label: "Link Title", name: "linkTitle", widget: "string", hint: "Output link title, default is empty."}
          - {label: "No Index", name: "noIndex", widget: "boolean", hint: "Output no index, default is false."}
          - {label: "No Follow", name: "noFollow", widget: "boolean", hint: "Output no follow, default is false."}
          - {label: "No Archive", name: "noArchive", widget: "boolean", hint: "Output no archive, default is false."}
          - {label: "No Snippet", name: "noSnippet", widget: "boolean", hint: "Output no snippet, default is false."}
          - {label: "No Image Index", name: "noImageIndex", widget: "boolean", hint: "Output no image index, default is false."}
          - {label: "No ODP", name: "noODP", widget: "boolean", hint: "Output no ODP, default is false."}
          - {label: "No Translate", name: "noTranslate", widget: "boolean", hint: "Output no translate, default is false."}
      - {label: "Slug", name: "slug", widget: "string",hint: "Custom slug URL."}
      - label: "Menu"
        name: "menu"
        widget: "object"
        hint: "Add new menu in home page."
        collapsed: true
        fields:
          - label: "Main"
            name: "main"
            hint: "Main Menu"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Identifier", name: "identifier", widget: "string", hint: "Item ID"}
              - {label: "Name", name: "name", widget: "string", hint: "Display text"}
              - {label: "URL", name: "url", widget: "string", hint: "Link URL"}
              - {label: "Weight", name: "weight", widget: "number", hint: "Priority of the item, lower value means higher priority."}
              - label: "Params"
                name: "params"
                widget: "object"
                fields:
                  - {label: "Icon", name: "icon", widget: "string", hint: "Specify which SVG icon should be used. (https://tabler-icons.io/)"}
                  - {label: "New Tab", name: "newtab", widget: "boolean", hint: "Open this link in new tab."}
          - label: "Social"
            name: "social"
            hint: "Social Menu ( Icon Only)"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Identifier", name: "identifier", widget: "string", hint: "Item ID"}
              - {label: "Name", name: "name", widget: "string", hint: "Display text"}
              - {label: "URL", name: "url", widget: "string", hint: "Link URL"}
              - {label: "Weight", name: "weight", widget: "number", hint: "Priority of the item, lower value means higher priority."}
              - label: "Params"
                name: "params"
                widget: "object"
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "string"
                    hint: "If icon is set to archive, theme will look for archive.svg under `assets/icons` folder. This theme comes with some SVG icons from Tabler Icons (https://tabler-icons.io/) . You can find them under theme folder assets/icons. To include more icons, just download them from website above, and place them under assets/icons folder of your Hugo site."
                  - {label: "New Tab", name: "newtab", widget: "boolean", hint: "Open this link in new tab."}
      - {label: "Comments", name: "comments", widget: "boolean",hint: "Allow comments on this page.", default: false}
      - label: "Links"
        name: "links"
        hint: "Links Menu"
        widget: "object"
        collapsed: true
        fields:
          - label: "Website"
            name: "list"
            widget: "list"
            hint: "Website"
            allow_add: true
            fields: 
              - {label: Title, name: title, widget: string}
              - {label: Description, name: description, widget: string}
              - {label: Website, name: website, widget: string}
              - {label: Image, name: image, widget: string}
      - {label: "Body", name: "body", widget: "markdown", hint: "You can leave empty if not used this.", required: false}

  - name: "pages"
    label: "Pages"
    files:
      - file: "content/_index.md"
        label: "Home Page"
        name: "home"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Subtitle, name: subtitle, widget: string}
          - {label: Image, name: image, widget: image}
          - {label: "Blurb", name: blurb, widget: object, fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Intro", name: intro, widget: object, fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Products", name: products, widget: list, fields: [
              {label: "Image", name: "image", widget: "image"},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Values", name: "values", widget: "object", fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
      - file: "content/contact/_index.md"
        label: "Contact Page"
        name: "contact"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Logo, name: logo, widget: image}
          - {label: Body, name: body, widget: markdown}
          - label: Contact Entries
            name: contact_entries
            widget: list
            fields:
              - label: Heading
                name: heading
                widget: string
              - label: Text
                name: text
                widget: text
      - file: "content/products/_index.md"
        label: "Products Page"
        name: "products"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Image, name: image, widget: image}
          - {label: Intro, name: intro, widget: object, fields: [{label: Heading, name: heading, widget: string}, {label: Description, name: description, widget: text}, {label: Blurbs, name: blurbs, widget: list, fields: [{label: Image, name: image, widget: image}, {label: Text, name: text, widget: text}]}]}
          - {label: Main, name: main, widget: object, fields: [{label: Heading, name: heading, widget: string}, {label: Description, name: description, widget: text}, {label: Image1, name: image1, widget: object, fields: [{label: Image, name: image, widget: image}, {label: Alt, name: alt, widget: string}]}, {label: Image2, name: image2, widget: object, fields: [{label: Image, name: image, widget: image}, {label: Alt, name: alt, widget: string}]}, {label: Image3, name: image3, widget: object, fields: [{label: Image, name: image, widget: image}, {label: Alt, name: alt, widget: string}]}]}
          - {label: Testimonials, name: testimonials, widget: list, fields: [{label: Quote, name: quote, widget: string}, {label: Author, name: author, widget: string}]}
          - {label: Full_image, name: full_image, widget: image}
          - {label: Pricing, name: pricing, widget: object, fields: [{label: Heading, name: heading, widget: string}, {label: Description, name: description, widget: string}, {label: Plans, name: plans, widget: list, fields: [{label: Plan, name: plan, widget: string}, {label: Price, name: price, widget: string}, {label: Description, name: description, widget: string}, {label: Items, name: items, widget: list}]}]}
      - file: "content/values/_index.md"
        label: "Values Page"
        name: "values"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Image, name: image, widget: image}
          - label: Values
            name: values
            widget: list
            fields:
              - {label: Heading, name: heading, widget: string}
              - {label: Text, name: text, widget: text}
              - {label: Image, name: imageUrl, widget: image}
  - name: "site_settings"
    label: "Site Settings"
    files:
      # - file: "site/data/footer.json"
      #   label: Footer
      #   name: footer
      #   fields:
      #     - {label: Title, name: title, widget: string}
      #     - {label: Blurb, name: blurb, widget: text}
      - file: "config/config.toml"
        label: Hugo Config
        name: config
        editor:
          preview: false
        fields:
          - {label: Site Title for Browser Tab, name: title, widget: string}
          - label: Params
            name: params
            widget: object
            fields:
              - label: Open Graph Image
                name: images
                widget: list
                field: { label: Image, name: image, widget: image }