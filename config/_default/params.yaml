# This params.yaml overrides the theme's default params.yaml.
# A full list of available params with their default values can be found in the theme's config/_default/params.yaml file.
favicon: img/favicon.png

footer:
  since: 2019
compact: true
dateFormat:
  published: 'Jan 02, 2006'
  lastUpdated: 'Jan 02, 2006 15:04 MST'
sidebar:
  # emoji: 🍥
  # subtitle: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
  avatar: img/avatar.png

comments:
  enabled: true
  provider: giscus
  giscus:
      repo: anasfanani/anasfanani.github.io
      repoID: R_kgDOKyjQBg
      category: Announcements
      categoryID: DIC_kwDOKyjQBs4CbZXp
      mapping: pathname
      lightTheme: light
      darkTheme: noborder_dark
      reactionsEnabled: 1
      emitMetadata: 0
article:
  math: false
  readingTime: true
  license:
    enabled: true
    default: Licensed under CC BY-NC-SA 4.0
# opengraph:
