#     local: false
#     src: ''
# colorScheme:
#   toggle: true
#   default: auto
imageProcessing:
  cover:
    enabled: true
  content:
    enabled: true
widgets:
  homepage:
    - type: search
    - type: archives
      params:
        limit: 5
    - type: taxonomy
      params:
        limit: 10
        type: tags
        icon: tag
    - type: taxonomy
      params:
        limit: 10
        type: categories
        icon: categories
  page:
    - type: toc
